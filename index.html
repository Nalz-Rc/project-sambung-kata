<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sambung Kata</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="app-card" aria-labelledby="app-title">
        <header class="hero">
          <p class="eyebrow">Pencarian Kata</p>
          <h1 id="app-title">Sambung Kata</h1>
          <p class="hero-copy">
            Cari kata berdasarkan awalan atau akhiran langsung dari data terbaru.
          </p>
        </header>

        <section class="panel" aria-label="Status data">
          <p id="status-text" class="status-text" aria-live="polite">Memuat data...</p>
        </section>

        <section class="panel controls-panel" aria-label="Kontrol pencarian">
          <div class="mode-group" role="group" aria-label="Mode pencarian">
            <button type="button" class="mode-button" data-mode="prefix" aria-pressed="true">
              Awalan
            </button>
            <button type="button" class="mode-button" data-mode="suffix" aria-pressed="false">
              Akhiran
            </button>
          </div>

          <div class="query-panel">
            <div class="query-label-row">
              <span class="query-label">Query aktif</span>
              <span id="query-mode-label" class="query-mode">Mode: Awalan</span>
            </div>
            <div id="query-display" class="query-display" aria-live="polite">-</div>
          </div>

          <div class="action-row">
            <button type="button" id="backspace-button" class="secondary-button">
              Backspace
            </button>
            <button type="button" id="reset-button" class="secondary-button">
              Reset
            </button>
          </div>

          <div
            id="letter-grid"
            class="letter-grid"
            role="group"
            aria-label="Tombol huruf A sampai Z"
          ></div>
        </section>

        <section class="panel results-panel" aria-label="Hasil pencarian">
          <p id="results-summary" class="results-summary" aria-live="polite">
            Pilih huruf untuk mulai mencari.
          </p>
          <div id="results-container" class="results-container">
            <p id="results-empty" class="results-empty">Pilih huruf untuk mulai mencari.</p>
            <ul id="results-list" class="results-list" aria-live="polite"></ul>
          </div>
        </section>
      </section>
    </main>

    <noscript>
      <div class="noscript-banner">
        Aplikasi ini membutuhkan JavaScript agar pencarian dapat berjalan.
      </div>
    </noscript>

    <script src="./app.js"></script>
  </body>
</html>
